/* ══════════════════════════════════════════════════════════════════════
   📱  LivePlayer — 学生抢答端（装扮同步版）
   ══════════════════════════════════════════════════════════════════════ */
const LivePlayer = ({ studentData, studentKey }) => {
  /* ─────────────────────────────────────────────────────────────────
     所有 Hook 必须无条件地声明在最顶部，绝不能放在任何 early-return 后面。
     ───────────────────────────────────────────────────────────────── */
  const [pin,       setPin]       = useState('');
  const [name,      setName]      = useState(studentData?.name || '');
  const [joined,    setJoined]    = useState(false);
  const [roomState, setRoomState] = useState(null);
  const [myAnswer,  setMyAnswer]  = useState(null);
  const [error,     setError]     = useState('');

  // refs：必须无条件在顶部声明
  const lastQuestionKeyRef = useRef(null);
  const resultSfxFiredRef  = useRef(false); // 防止每次 roomState 更新都重复播音效

  // 本地倒计时 state（由 timerDeadline 驱动，无需每秒 Firebase 读写）
  const [countdown, setCountdown] = useState(0);

  /* ── 房间实时监听 ─────────────────────────────────────────────── */
  useEffect(() => {
    if (!joined || !pin.trim()) return;
    const roomRef = database.ref(`live_rooms/${pin.trim()}`);
    const listener = roomRef.on('value', snap => {
      if (snap.exists()) setRoomState(snap.val());
    });
    return () => roomRef.off('value', listener);
  }, [joined, pin]);

  /* ── 新题出现时重置答题状态 ─────────────────────────────────── */
  useEffect(() => {
    if (!joined) return;
    const question = roomState?.currentQuestion;
    if (!question) {
      if (lastQuestionKeyRef.current !== null) {
        lastQuestionKeyRef.current = null;
        resultSfxFiredRef.current  = false; // 新题重置音效旗帜
        setMyAnswer(null);
      }
      return;
    }
    const questionKey = `${question.q}::${question.ans}`;
    if (lastQuestionKeyRef.current !== questionKey) {
      lastQuestionKeyRef.current = questionKey;
      resultSfxFiredRef.current  = false; // 新题重置音效旗帜
      setMyAnswer(null);
    }
  }, [joined, roomState?.currentQuestion?.q, roomState?.currentQuestion?.ans]);

  /* ── 结果音效触发（无条件 Hook，内部按条件执行） ───────────────
     触发条件：
       1. 学生已作答（myAnswer !== null）
       2. Firebase 已将 isCorrect 写回（roomState 里能读到）
       3. 本题还没播过音效（resultSfxFiredRef.current === false）
     ─────────────────────────────────────────────────────────────── */
  useEffect(() => {
    if (!joined) return;
    const myData  = roomState?.players?.[name];
    const hasFired = resultSfxFiredRef.current;
    // isCorrect 字段由 handleAnswer 写入 Firebase，realtime 同步回来后触发
    if (myAnswer !== null && myData?.isCorrect !== undefined && !hasFired) {
      resultSfxFiredRef.current = true;
      if (myData.isCorrect) AudioEngine.sfxCorrect();
      else                  AudioEngine.sfxWrong();
    }
  }, [joined, myAnswer, roomState?.players, name]);

  /* ── 本地倒计时引擎（从 Firebase timerDeadline 推算，无需每秒同步）──
     原理：老师出题时写入一次 deadline（绝对时间戳），
     学生端用 setInterval 每秒计算 ceil((deadline - now) / 1000)。
     不受网络延迟影响，精度约 ±1 秒。
     ─────────────────────────────────────────────────────────────── */
  useEffect(() => {
    const deadline = roomState?.timerDeadline || 0;

    // deadline === 0 → 老师关闭了计时器，不显示
    if (!deadline) {
      setCountdown(0);
      return;
    }

    // 计算初始剩余秒数
    const calc = () => Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
    setCountdown(calc());

    // 如果已超时则不启动 interval
    if (calc() === 0) return;

    const interval = setInterval(() => {
      const remaining = calc();
      setCountdown(remaining);
      if (remaining <= 0) clearInterval(interval);
    }, 1000);

    return () => clearInterval(interval);
  }, [roomState?.timerDeadline]);

  /* ── 加入房间 ────────────────────────────────────────────────── */
  const handleJoin = async () => {
    if (!pin.trim() || !name.trim()) { setError('请输入房间 PIN 码和姓名！'); return; }
    AudioEngine.sfxClick();
    try {
      const roomSnap = await database.ref(`live_rooms/${pin.trim()}`).once('value');
      if (!roomSnap.exists()) { setError('❌ 房间不存在！请确认 PIN 码。'); return; }
      const equippedTitle = studentData?.equippedTitle || '';
      const equippedFrame = studentData?.equippedFrame || '';
      await database.ref(`live_rooms/${pin.trim()}/players/${name.trim()}`).set({
        name:          name.trim(),
        score:         0,
        equippedTitle: equippedTitle,
        equippedFrame: equippedFrame,
        joinedAt:      firebase.database.ServerValue.TIMESTAMP,
      });
      lastQuestionKeyRef.current = null;
      resultSfxFiredRef.current  = false;
      setMyAnswer(null);
      setJoined(true);
      setError('');
    } catch (e) {
      setError('❌ 网络错误，请重试。');
    }
  };

  /* ── 提交答案（含 isCorrect + score 写回 Firebase） ─────────── */
  const handleAnswer = async (optIdx) => {
    if (myAnswer !== null) return;
    const question = roomState?.currentQuestion;
    if (!question) return;
    const isCorrect = optIdx === question.ans;
    // 立刻播放音效：不等 Firebase 回写，即时反馈手感
    if (isCorrect) AudioEngine.sfxCorrect();
    else           AudioEngine.sfxWrong();
    // 标记已触发，防止 Firebase 回写后 useEffect 重复播放
    resultSfxFiredRef.current = true;
    setMyAnswer(optIdx);
    const pointsEarned = isCorrect ? 100 : 0;
    // 读当前积分后累加，避免多题覆盖
    const playerRef    = database.ref(`live_rooms/${pin}/players/${name}`);
    const snap         = await playerRef.once('value');
    const currentScore = snap.val()?.score || 0;
    await playerRef.update({
      answer:     optIdx,
      answeredAt: firebase.database.ServerValue.TIMESTAMP,
      isCorrect:  isCorrect,               // ← 结果画面的触发信号
      score:      currentScore + pointsEarned,
    });
    // isCorrect 写入 Firebase → realtime 监听 → roomState 更新
    // → 上方 useEffect 检测到 isCorrect 字段 → 触发音效 + 显示结果画面
  };

  /* ─────────────────────────────────────────────────────────────────
     以下为渲染层，所有 Hook 已在上方声明完毕。
     此处可安全使用 early-return，不违反 Rules of Hooks。
     ───────────────────────────────────────────────────────────────── */

  /* ── 登录前画面 ─────────────────────────────────────────────── */
  if (!joined) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-[#030712] p-4">
        <div className="glass max-w-sm w-full p-8 rounded-3xl flex flex-col gap-5">
          <h2 className="text-2xl font-black text-cyan-400 text-center">📡 加入 LIVE 课堂</h2>
          {error && (
            <div className="text-red-400 text-sm bg-red-500/10 p-3 rounded-xl text-center font-bold">
              {error}
            </div>
          )}
          <input
            className="edit-input"
            placeholder="输入房间 PIN 码"
            value={pin}
            onChange={e => setPin(e.target.value)}
          />
          <input
            className="edit-input"
            placeholder="输入你的名字"
            value={name}
            onChange={e => setName(e.target.value)}
          />
          {(studentData?.equippedTitle || studentData?.equippedFrame) && (
            <div className="bg-slate-900 border border-cyan-500/20 rounded-xl p-3 text-xs text-center">
              <div className="text-slate-400 mb-1">将以以下装扮亮相：</div>
              <div className="flex items-center justify-center gap-2 flex-wrap">
                {studentData?.equippedTitle && (() => {
                  const t = ALL_TITLES.find(x => x.id === studentData.equippedTitle);
                  return t ? <span className="text-orange-300 font-bold">{t.label}</span> : null;
                })()}
                <span className="text-white font-bold">{name}</span>
                {studentData?.equippedFrame && (() => {
                  const f = ALL_FRAMES.find(x => x.id === studentData.equippedFrame);
                  return f ? <span className="text-cyan-300 font-bold">{f.label}</span> : null;
                })()}
              </div>
            </div>
          )}
          <button
            onClick={handleJoin}
            className="bg-gradient-to-r from-cyan-600 to-indigo-600 text-white py-4 rounded-2xl font-black text-lg"
          >
            🚀 进入课堂
          </button>
        </div>
      </div>
    );
  }

  /* ── 已加入房间：计算当前视图所需数据 ─────────────────────────
     myData.isCorrect 由 handleAnswer 写入 Firebase，
     roomState 的 realtime 监听把它同步回来。
     这是唯一的"结果触发信号"，不依赖 LiveHost 的 hostTab。
     ─────────────────────────────────────────────────────────────── */
  const question  = roomState?.currentQuestion;
  const myData    = roomState?.players?.[name];
  // 结果画面显示条件：已作答 AND isCorrect 字段已从 Firebase 同步回来
  const showResult = myAnswer !== null && myData?.isCorrect !== undefined;
  const isCorrect  = myData?.isCorrect === true;
  const myScore    = myData?.score ?? 0;

  return (
    <div className="min-h-screen bg-[#030712] flex flex-col items-center justify-center p-4 gap-6">

      {/* 顶部：房间号 + 名字 */}
      <div className="text-center">
        <p className="text-xs text-slate-500 font-mono">ROOM {pin}</p>
        <p className="text-base font-black text-white mt-1">{name}</p>
      </div>

      {/* ── 画面一：等待老师出题 ─────────────────────────────────── */}
      {!question && !showResult && (
        <div className="text-center">
          <div className="text-5xl mb-4 animate-pulse">⏳</div>
          <p className="text-cyan-400 font-bold">等待老师出题中...</p>
        </div>
      )}

      {/* ── 画面二：答题区（有题目 且 尚未答题） ─────────────────── */}
      {question && !showResult && (
        <div className="w-full max-w-md flex flex-col gap-4">

          {/* 倒计时条（countdown > 0 时显示；老师关闭计时器则隐藏） */}
          {countdown > 0 && (
            <div className="flex flex-col gap-1.5">
              {/* 数字 + 颜色 */}
              <div className="flex justify-between items-center px-1">
                <span className="text-xs font-bold text-slate-500 tracking-wider">⏱ 剩余时间</span>
                <span className={`text-2xl font-black font-mono tabular-nums transition-colors
                  ${countdown <= 5  ? 'text-red-400 animate-bounce'
                  : countdown <= 10 ? 'text-orange-400'
                  :                   'text-cyan-400'}`}>
                  {countdown}s
                </span>
              </div>
              {/* 进度条（需要知道总时长，从 timerDeadline 倒推） */}
              {(() => {
                const deadline  = roomState?.timerDeadline || 0;
                // 从题目出现到现在的已用秒数推算总时长
                // 用 countdown 当前值 + 已消耗时间 = 无法直接知道，
                // 所以我们从 question 对象里拿不到总时长。
                // 最简单：用 countdown / max(countdown 见过的最大值) 来做近似，
                // 或直接用 deadline - questionStartedAt (未写入)。
                // 这里用最简单可靠的方案：条形宽度 = countdown / 
                // roomState.timerDurationSecs (老师出题时一并写入)
                const total = roomState?.timerDurationSecs || countdown;
                const pct   = Math.min(100, Math.round((countdown / total) * 100));
                return (
                  <div className="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div
                      className={`h-full rounded-full transition-all duration-1000 ease-linear
                        ${countdown <= 5  ? 'bg-red-500'
                        : countdown <= 10 ? 'bg-orange-400'
                        :                   'bg-cyan-500'}`}
                      style={{ width: pct + '%' }}
                    />
                  </div>
                );
              })()}
            </div>
          )}

          {/* 题目 */}
          <div className="bg-indigo-950/40 border border-indigo-500/30 p-6 rounded-2xl">
            <h3 className="text-lg font-bold text-white text-center">{question.q}</h3>
          </div>
          {/* 选项 */}
          <div className="grid grid-cols-1 gap-3">
            {question.opts.map((opt, i) => (
              <button
                key={i}
                onClick={() => handleAnswer(i)}
                disabled={myAnswer !== null}
                className={`p-5 rounded-2xl font-bold text-base border-2 transition-all
                  ${myAnswer === i
                    ? 'bg-cyan-600 border-cyan-400 text-white scale-[1.02]'
                    : myAnswer !== null
                      ? 'opacity-40 cursor-not-allowed bg-slate-800 border-slate-600 text-white'
                      : 'bg-slate-800 border-slate-600 text-white hover:border-cyan-500 hover:bg-slate-700'
                  }`}
              >
                {['A','B','C','D'][i]}. {opt}
              </button>
            ))}
          </div>
          {/* 已提交等待提示 */}
          {myAnswer !== null && (
            <div className="text-center text-amber-400 font-black animate-pulse text-sm">
              ⏳ 答案已提交！等待结果同步...
            </div>
          )}
        </div>
      )}

      {/* ── 画面三：结果反馈（isCorrect 从 Firebase 同步回来后立即显示） */}
      {showResult && (
        <div className="w-full max-w-md flex flex-col items-center gap-5 animate-popIn">
          {isCorrect ? (
            /* 答对 */
            <div className="w-full bg-gradient-to-br from-emerald-900/60 to-teal-950/80
                            border-2 border-emerald-400/60
                            shadow-[0_0_40px_rgba(52,211,153,0.35)]
                            rounded-3xl p-10 flex flex-col items-center gap-4 text-center">
              <div className="text-7xl animate-bounce">🎉</div>
              <h2 className="text-3xl font-black text-emerald-300">恭喜答对！</h2>
              <div className="bg-emerald-500/20 border border-emerald-500/40 px-8 py-3 rounded-2xl">
                <span className="text-4xl font-black text-emerald-400 font-mono">+100 PTS</span>
              </div>
              <p className="text-emerald-200/70 text-sm font-bold">
                累计积分：<span className="text-emerald-300 font-black">{myScore} PTS</span>
              </p>
            </div>
          ) : (
            /* 答错 */
            <div className="w-full bg-gradient-to-br from-red-900/60 to-rose-950/80
                            border-2 border-red-400/50
                            shadow-[0_0_30px_rgba(239,68,68,0.25)]
                            rounded-3xl p-10 flex flex-col items-center gap-4 text-center">
              <div className="text-7xl">😤</div>
              <h2 className="text-3xl font-black text-red-300">很遗憾答错了</h2>
              <p className="text-red-200/80 text-base font-bold">继续努力，下题加油！</p>
              {question && (
                <div className="bg-red-500/10 border border-red-500/30 px-6 py-3 rounded-xl text-sm">
                  <span className="text-slate-400">正确答案：</span>
                  <span className="text-emerald-400 font-black ml-1">
                    {question.opts[question.ans]}
                  </span>
                </div>
              )}
              <p className="text-slate-500 text-sm font-bold">
                累计积分：<span className="text-slate-400">{myScore} PTS</span>
              </p>
            </div>
          )}

          {/* 等待下题提示 */}
          <p className="text-slate-500 text-xs font-bold animate-pulse">
            等待老师出下一题...
          </p>
        </div>
      )}

    </div>
  );
};


/* ══════════════════════════════════════════════════════════════════════
   🖥️  LiveHost — 导师大屏端（装扮渲染版）
   ══════════════════════════════════════════════════════════════════════ */
const LiveHost = ({ onExit }) => {
  const [pin,         setPin]         = useState('');
  const [hosting,     setHosting]     = useState(false);
  const [roomData,    setRoomData]    = useState(null);
  const [hostTab,     setHostTab]     = useState('lobby'); // lobby | question | leaderboard | finished
  const [curQ,        setCurQ]        = useState(null);
  const [questions,   setQuestions]   = useState([]);
  const [qPointer,    setQPointer]    = useState(0);
  const [timer,         setTimer]         = useState(20);
  const [timerActive,   setTimerActive]   = useState(false);
  const [timerEnabled,  setTimerEnabled]  = useState(true);   // 是否开启计时器
  const [timerDuration, setTimerDuration] = useState(20);     // 每题秒数（老师自由调整）
  const prevHostTabRef   = useRef('lobby');
  const timerLiveRef    = useRef(false); // 只有从正数倒数到 0 才允许自动跳排行

  /* ── 计时器 + 最后10秒嘀嗒音（仅在 timerEnabled 时运行） ──────── */
  useEffect(() => {
    if (!timerEnabled || !timerActive || timer <= 0) return;
    // 确认计时器正在从正数倒数，标记为"真实计时中"
    timerLiveRef.current = true;
    if (hostTab === 'question' && timer <= 10) AudioEngine.sfxTick();
    const t = setTimeout(() => setTimer(p => p - 1), 1000);
    return () => clearTimeout(t);
  }, [timer, timerActive, timerEnabled, hostTab]);

  useEffect(() => {
    if (!timerEnabled) return;
    // timerLiveRef 防止 setTimer(timerDuration) 和 setTimerActive(true) 在同一批 render
    // 中产生 timer=0,timerActive=true 的瞬间中间态而误触发
    if (timer === 0 && timerActive && timerLiveRef.current) {
      timerLiveRef.current = false;
      setTimerActive(false);
      setHostTab('leaderboard');
      AudioEngine.sfxCorrect();
    }
  }, [timer, timerActive, timerEnabled]);

  /* ── 手动切换排行 / 大奖台 → 胜利和弦 ───────────────────────── */
  useEffect(() => {
    const prev = prevHostTabRef.current;
    if (prev !== hostTab) {
      if (hostTab === 'leaderboard' && prev !== 'question') AudioEngine.sfxCorrect();
      if (hostTab === 'finished') AudioEngine.sfxCorrect();
      prevHostTabRef.current = hostTab;
    }
  }, [hostTab]);

  /* ── 开房 ───────────────────────────────────────────────────── */
  const handleStartRoom = async () => {
    const roomPin = pin || Math.floor(1000 + Math.random() * 9000).toString();
    setPin(roomPin);
    await database.ref(`live_rooms/${roomPin}`).set({
      status: 'waiting',
      players: {},
      createdAt: firebase.database.ServerValue.TIMESTAMP,
    });
    database.ref(`live_rooms/${roomPin}`).on('value', snap => {
      if (snap.exists()) setRoomData(snap.val());
    });

    // 拉取题库
    const snap = await database.ref('settings/arcadeQuestions').once('value');
    setQuestions(snap.exists() ? snap.val() : DEFAULT_QUESTIONS);

    setHosting(true);
    setHostTab('lobby');
    AudioEngine.sfxClick();
  };

  /* ── 出题 ───────────────────────────────────────────────────── */
  const handleAskQuestion = async () => {
    const q = questions[qPointer % questions.length];
    setCurQ(q);
    timerLiveRef.current = false;      // 重置，等待真实倒数后再允许自动跳排行
    setTimer(timerDuration);           // 使用老师配置的时长
    setTimerActive(timerEnabled);      // 仅在开启计时器时激活
    setHostTab('question');
    // 清除玩家上题答案
    const updates = {};
    Object.keys(roomData?.players || {}).forEach(pName => {
      updates[`live_rooms/${pin}/players/${pName}/answer`] = null;
      updates[`live_rooms/${pin}/players/${pName}/answeredAt`] = null;
    });
    await database.ref().update(updates);
    // 写入计时截止时间戳（学生端用此推算倒计时，无需每秒同步）
    // timerEnabled 关闭时写 0，学生端检测到 0 则不显示倒计时
    const deadlineMs = timerEnabled ? Date.now() + timerDuration * 1000 : 0;
    // 同时写入总时长供学生端进度条使用
    await database.ref(`live_rooms/${pin}/timerDeadline`).set(deadlineMs);
    await database.ref(`live_rooms/${pin}/timerDurationSecs`).set(timerEnabled ? timerDuration : 0);
    await database.ref(`live_rooms/${pin}/currentQuestion`).set(q);
    setQPointer(p => p + 1);
    AudioEngine.sfxClick();
  };

  // Fix: 移除未使用的 setMyAnswer（LiveHost 不需要）
  // eslint 忽略

  /* ── 结束课堂 ───────────────────────────────────────────────── */
  const handleFinish = () => {
    setHostTab('finished');
    database.ref(`live_rooms/${pin}/currentQuestion`).remove();
    AudioEngine.sfxCorrect();
  };

  /* ── 积分排行（从 roomData.players 读取） ────────────────────── */
  const sortedPlayers = Object.values(roomData?.players || {})
    .sort((a, b) => (b.score || 0) - (a.score || 0));

  /* ── 单行选手渲染（带装扮特效） ─────────────────────────────── */
  const PlayerRow = ({ player, rank, isLarge }) => {
    const { title, frame } = resolveCosmetics(player);
    const medal = ['🥇','🥈','🥉'][rank] || null;

    // 头像框决定整行发光样式
    let rowExtra = 'border-white/5 bg-slate-950/60';
    let rowBg    = {};
    if (frame) {
      rowExtra = `border-2 ${frame.rowGlowClass}`;
      rowBg    = { background: frame.liveBg };
    }

    // 前三名默认底色
    const podiumBg = [
      'bg-gradient-to-r from-yellow-900/40 to-yellow-600/10 border-yellow-500/50',
      'bg-gradient-to-r from-slate-700/40 to-slate-500/10 border-slate-400/50',
      'bg-gradient-to-r from-orange-900/40 to-orange-600/10 border-orange-500/50',
    ];

    const finalRowClass = frame
      ? rowExtra
      : (rank < 3 ? podiumBg[rank] : 'border-white/5 bg-slate-950/60');

    return (
      <div
        className={`flex items-center gap-4 px-5 py-4 rounded-2xl border transition-all ${finalRowClass} ${isLarge ? 'py-6' : ''}`}
        style={rowBg}
      >
        {/* 排名 */}
        <div className={`shrink-0 font-black ${isLarge ? 'text-4xl w-12' : 'text-xl w-8'} text-center`}>
          {medal || <span className="text-slate-400 text-base">{rank + 1}</span>}
        </div>

        {/* 称号 + 名字 */}
        <div className="flex-1 min-w-0">
          {title && (
            <div
              className={`text-xs font-black mb-0.5 ${isLarge ? 'text-sm' : ''}`}
              style={{ background: 'linear-gradient(90deg,#f97316,#ef4444)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}
            >
              {title.label}
            </div>
          )}
          <div className={`font-black text-white truncate ${isLarge ? 'text-2xl' : 'text-base'}`}>
            {player.name}
          </div>
          {frame && (
            <div className={`text-xs mt-0.5 font-bold ${
              frame.id === 'frame_lightning'   ? 'text-cyan-400'   :
              frame.id === 'frame_gold_shield' ? 'text-yellow-400' :
              'text-red-400'
            }`}>
              {frame.label}
            </div>
          )}
        </div>

        {/* 积分 */}
        <div className={`font-mono font-black text-amber-400 shrink-0 ${isLarge ? 'text-3xl' : 'text-lg'}`}>
          {player.score || 0}
          <span className={`text-slate-500 ml-1 ${isLarge ? 'text-sm' : 'text-[10px]'}`}>PTS</span>
        </div>
      </div>
    );
  };

  if (!hosting) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-[#030712] p-4">
        <div className="glass max-w-sm w-full p-8 rounded-3xl flex flex-col gap-5">
          {onExit && <button onClick={onExit} className="text-slate-500 hover:text-white text-sm font-bold self-start mb-2">⬅️ 返回控制台</button>}
          <h2 className="text-2xl font-black text-indigo-400 text-center">🎓 开启 LIVE 课堂</h2>
          <input
            className="edit-input"
            placeholder="自定义 PIN 码（选填，可留空自动生成）"
            value={pin}
            onChange={e => setPin(e.target.value)}
          />

          {/* ── 计时器配置区 ── */}
          <div className="bg-slate-950/60 border border-indigo-500/20 rounded-2xl p-4 flex flex-col gap-3">
            <div className="flex items-center justify-between">
              <span className="text-sm font-black text-indigo-300">⏱ 每题计时器</span>
              {/* 开关 */}
              <button
                onClick={() => setTimerEnabled(p => !p)}
                className={`relative w-12 h-6 rounded-full transition-all duration-300 focus:outline-none
                  ${timerEnabled ? 'bg-indigo-500' : 'bg-slate-700'}`}
              >
                <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all duration-300
                  ${timerEnabled ? 'left-6' : 'left-0.5'}`} />
              </button>
            </div>
            {timerEnabled && (
              <div className="flex flex-col gap-2">
                <div className="flex items-center justify-between text-xs text-slate-400 font-bold">
                  <span>时长</span>
                  <span className="text-indigo-300 font-black text-base">{timerDuration}s</span>
                </div>
                {/* 快选按钮 */}
                <div className="flex gap-2">
                  {[10, 15, 20, 30, 45, 60].map(s => (
                    <button
                      key={s}
                      onClick={() => setTimerDuration(s)}
                      className={`flex-1 py-1.5 rounded-lg text-xs font-black transition-all
                        ${timerDuration === s
                          ? 'bg-indigo-600 text-white'
                          : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                    >
                      {s}s
                    </button>
                  ))}
                </div>
                {/* 手动输入 */}
                <div className="flex items-center gap-2">
                  <span className="text-xs text-slate-500 shrink-0">自定义：</span>
                  <input
                    type="number"
                    min={5}
                    max={300}
                    value={timerDuration}
                    onChange={e => {
                      const v = Math.min(300, Math.max(5, Number(e.target.value) || 5));
                      setTimerDuration(v);
                    }}
                    className="edit-input text-center text-sm py-1.5"
                    style={{padding:'6px 10px'}}
                  />
                  <span className="text-xs text-slate-500 shrink-0">秒</span>
                </div>
              </div>
            )}
            {!timerEnabled && (
              <p className="text-xs text-slate-500 font-bold text-center">关闭后老师手动控制题目节奏</p>
            )}
          </div>

          <button
            onClick={handleStartRoom}
            className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 rounded-2xl font-black text-lg"
          >
            🚀 开启课堂
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#030712] p-6 flex flex-col gap-6">

      {/* 顶栏 */}
      <div className="flex justify-between items-center">
        <div>
          <span className="text-xs text-indigo-400 font-bold tracking-widest">LIVE CLASSROOM</span>
          <h1 className="text-3xl font-black text-white">
            房间 PIN：<span className="text-cyan-400 font-mono">{pin}</span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">
            已入场：{Object.keys(roomData?.players || {}).length} 名学生
          </p>
        </div>
        <div className="flex gap-3">
          <button
            onClick={handleAskQuestion}
            className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-black transition-all"
          >
            ➕ 出下一题
          </button>
          <button
            onClick={handleFinish}
            className="bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white px-6 py-3 rounded-xl font-black transition-all"
          >
            🏁 结束课堂
          </button>
        </div>
      </div>

      {/* 标签栏 */}
      <div className="flex gap-3 border-b border-white/10 pb-4">
        {[
          ['lobby',       '🚪 等候大厅'],
          ['question',    '❓ 当前题目'],
          ['leaderboard', '🏆 实时排行'],
          ['finished',    '🎊 大奖台'],
        ].map(([tab, label]) => (
          <button
            key={tab}
            onClick={() => { AudioEngine.sfxClick(); setHostTab(tab); }}
            className={`px-5 py-2.5 rounded-xl text-sm font-black transition-all
              ${hostTab === tab ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
          >
            {label}
          </button>
        ))}
      </div>

      {/* ── 等候大厅 ─────────────────────────────────────────────── */}
      {hostTab === 'lobby' && (
        <div className="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-3">
          {Object.values(roomData?.players || {}).map((player, i) => {
            const { title, frame } = resolveCosmetics(player);
            return (
              <div
                key={player.name}
                className={`p-4 rounded-2xl border-2 text-center flex flex-col items-center gap-2 transition-all animate-popIn
                  ${frame ? frame.rowGlowClass : 'border-indigo-500/30 bg-slate-900/60'}`}
              >
                <div className="text-3xl">
                  {title ? title.label.split(' ')[0] : '🎓'}
                </div>
                {title && (
                  <div className="text-[9px] font-black text-orange-300 leading-tight">
                    {title.label}
                  </div>
                )}
                <div className="font-black text-white text-sm">{player.name}</div>
                {frame && (
                  <div className={`text-[9px] font-bold ${
                    frame.id === 'frame_lightning'   ? 'text-cyan-400'   :
                    frame.id === 'frame_gold_shield' ? 'text-yellow-400' :
                    'text-red-400'
                  }`}>
                    {frame.label}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── 当前题目 ─────────────────────────────────────────────── */}
      {hostTab === 'question' && curQ && (
        <div className="flex flex-col items-center gap-6">
          <div className="bg-indigo-950/40 border border-indigo-500/30 p-10 rounded-3xl w-full max-w-3xl text-center">

            {/* 计时器显示 */}
            {timerEnabled ? (
              <div className={`text-5xl font-black font-mono mb-2 ${
                timer <= 5 ? 'text-red-400 animate-bounce' :
                timer <= 10 ? 'text-orange-400' : 'text-cyan-400'
              }`}>
                ⏱ {timer}s
              </div>
            ) : (
              <div className="text-2xl font-black text-slate-500 mb-2">⏱ 无计时</div>
            )}

            {/* 计时器实时控制栏（出题后仍可调整） */}
            <div className="flex items-center justify-center gap-3 mb-4">
              {timerEnabled && (
                <>
                  <button
                    onClick={() => setTimer(p => Math.max(0, p - 5))}
                    className="bg-slate-800 hover:bg-red-900/50 text-slate-300 hover:text-red-300 px-3 py-1 rounded-lg text-xs font-black transition-all"
                  >－5s</button>
                  <button
                    onClick={() => setTimerActive(p => !p)}
                    className={`px-4 py-1 rounded-lg text-xs font-black transition-all
                      ${timerActive
                        ? 'bg-amber-600 hover:bg-amber-500 text-white'
                        : 'bg-emerald-700 hover:bg-emerald-600 text-white'}`}
                  >
                    {timerActive ? '⏸ 暂停' : '▶ 继续'}
                  </button>
                  <button
                    onClick={() => setTimer(p => p + 5)}
                    className="bg-slate-800 hover:bg-emerald-900/50 text-slate-300 hover:text-emerald-300 px-3 py-1 rounded-lg text-xs font-black transition-all"
                  >＋5s</button>
                </>
              )}
              <button
                onClick={() => {
                  setTimerEnabled(p => {
                    const next = !p;
                    if (next) { setTimer(timerDuration); setTimerActive(true); }
                    else      { setTimerActive(false); }
                    return next;
                  });
                }}
                className="bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white px-3 py-1 rounded-lg text-xs font-bold transition-all"
              >
                {timerEnabled ? '关闭计时' : '开启计时'}
              </button>
            </div>

            <h2 className="text-2xl md:text-3xl font-bold text-white">{curQ.q}</h2>
          </div>
          <div className="grid grid-cols-2 gap-4 w-full max-w-3xl">
            {curQ.opts.map((opt, i) => (
              <div
                key={i}
                className={`p-5 rounded-2xl border-2 font-bold text-lg flex items-center gap-3
                  ${i === curQ.ans
                    ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300'
                    : 'bg-slate-900 border-slate-700 text-slate-300'}`}
              >
                <span className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-black">
                  {['A','B','C','D'][i]}
                </span>
                {opt}
                {i === curQ.ans && <span className="ml-auto text-emerald-400">✅</span>}
              </div>
            ))}
          </div>
          {/* 已作答人数进度 */}
          <div className="text-sm text-slate-400 font-bold">
            已作答：
            {Object.values(roomData?.players || {}).filter(p => p.answer !== undefined && p.answer !== null).length}
            /{Object.keys(roomData?.players || {}).length} 人
          </div>
        </div>
      )}

      {/* ── 实时排行榜（装扮特效全开） ───────────────────────────── */}
      {hostTab === 'leaderboard' && (
        <div className="flex flex-col gap-3 max-w-2xl mx-auto w-full">
          <h2 className="text-2xl font-black text-white mb-2 text-center">🏆 实时排行榜</h2>
          {sortedPlayers.map((player, idx) => (
            <PlayerRow key={player.name} player={player} rank={idx} isLarge={false} />
          ))}
          {sortedPlayers.length === 0 && (
            <div className="text-center text-slate-500 py-10">暂无学生数据</div>
          )}
        </div>
      )}

      {/* ── 最终大奖台（装扮特效 + 大尺寸） ─────────────────────── */}
      {hostTab === 'finished' && (
        <div className="flex flex-col items-center gap-6">
          <div className="text-6xl animate-popIn">🎊</div>
          <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
            最终大奖台
          </h2>
          <div className="flex flex-col gap-4 w-full max-w-xl">
            {sortedPlayers.slice(0, 10).map((player, idx) => (
              <PlayerRow key={player.name} player={player} rank={idx} isLarge={idx < 3} />
            ))}
          </div>
          <button
            onClick={() => database.ref(`live_rooms/${pin}`).remove().then(() => { setHosting(false); setRoomData(null); setPin(''); })}
            className="mt-4 bg-red-500/20 text-red-400 border border-red-500/30 px-8 py-3 rounded-xl font-bold hover:bg-red-500/30 transition-all"
          >
            🗑️ 关闭并清除房间数据
          </button>
        </div>
      )}
    </div>
  );
};



/* ══════════════════════ 顶级架构引擎 ══════════════════════ */
const App = () => {
  const [currentUser, setCurrentUser] = useState(
    () => JSON.parse(localStorage.getItem('CikguHong_ActiveUser_V411'))
  );
  const [db,          setDb]          = useState(null);
  const [currentMenu, setCurrentMenu] = useState("dashboard");
  const [streakData,  setStreakData]  = useState(null);
  const streakApplied = useRef(false);

  /* ── 监听学生数据库 ──────────────────────────────────────────── */
  useEffect(() => {
    const dbRef = database.ref('students');
    const listener = dbRef.on('value', snap => {
      if (snap.exists()) {
        setDb(snap.val());
      } else {
        dbRef.set(DEFAULT_STUDENTS);
        setDb(DEFAULT_STUDENTS);
      }
    });
    return () => dbRef.off('value', listener);
  }, []);

  /* ── 连登奖励（首次加载，仅学生） ───────────────────────────── */
  useEffect(() => {
    if (currentUser && db && !streakApplied.current && currentUser.role === 'student') {
      streakApplied.current = true;
      const streak = LoginStreak.check();
      if (streak.isNew) {
        setStreakData(streak);
        if (streak.bonus > 0) {
          const key = db[currentUser.username] ? currentUser.username : "student_1";
          const target = { ...db[key] };
          target.pts = (target.pts || 0) + streak.bonus;
          database.ref(`students/${key}`).set(target);
        }
      }
    }
  }, [currentUser, db]);

  const handleLogout = () => {
    AudioEngine.sfxClick();
    localStorage.removeItem('CikguHong_ActiveUser_V411');
    setCurrentUser(null);
    setCurrentMenu("dashboard");
    streakApplied.current = false;
  };

  const handleLoginSuccess = (user) => {
    AudioEngine.sfxClick();
    localStorage.setItem('CikguHong_ActiveUser_V411', JSON.stringify(user));
    setCurrentUser(user);
  };

  const handleUpdateStudent = (id, newObj) => {
    database.ref(`students/${id}`).set(newObj);
  };

  if (!currentUser) return <AuthScreen onAuthSuccess={handleLoginSuccess} />;
  if (!db) return (
    <div className="min-h-screen flex items-center justify-center bg-[#030712]">
      <div className="text-cyan-400 font-bold animate-pulse text-base tracking-widest">
        ☁️ Menyambung ke Cloud...
      </div>
    </div>
  );

  const role        = currentUser.role;
  /* 确定当前学生的 Firebase key */
  const studentKey  = db[currentUser.username] ? currentUser.username : "student_1";

  return (
    <div style={{ display: "flex", minHeight: "100vh", overflow: "hidden" }}>

      {/* ── 侧边栏 ────────────────────────────────────────────────── */}
      <div className="glass-dark w-64 flex flex-col shrink-0 border-r border-cyan-500/10 shadow-[2px_0_20px_rgba(6,182,212,0.05)] z-40">
        <div className="p-6 border-b border-white/5">
          <h2 className="font-mono font-black text-base text-cyan-400 tracking-wider">Cikgu Hong BM</h2>
          <p className="text-[11px] text-emerald-400 font-semibold mt-1 animate-pulse">● EduCraft Cloud V28</p>
        </div>
        <div className="flex-1 p-4 space-y-3 overflow-y-auto elder-scrollbar">
          {role === "student" && (
            <React.Fragment>
              <button
                onClick={() => { AudioEngine.sfxClick(); setCurrentMenu("dashboard"); }}
                className={`w-full nav-item p-3.5 rounded-xl text-sm font-bold flex items-center gap-3 transition-colors
                  ${currentMenu === "dashboard"
                    ? 'bg-cyan-500/20 text-cyan-400 border-l-4 border-cyan-400'
                    : 'text-slate-400 border-l-4 border-transparent'}`}
              >
                <span>📊</span> 核心诊断大盘
              </button>
              <button
                onClick={() => { AudioEngine.sfxClick(); setCurrentMenu("arcade"); }}
                className={`w-full nav-item p-3.5 rounded-xl text-sm font-bold flex items-center gap-3 transition-colors
                  ${currentMenu === "arcade"
                    ? 'bg-amber-500/20 text-amber-400 border-l-4 border-amber-400'
                    : 'text-slate-400 border-l-4 border-transparent'}`}
              >
                <span>🎮</span>
                <span className="flex items-center gap-2">
                  Game Universe
                  <span className="bg-red-500 text-white font-black px-1.5 py-0.5 rounded-md text-[9px] animate-bounce">
                    V28
                  </span>
                </span>
              </button>
            </React.Fragment>
          )}
          {role === "teacher" && (
            <button className="w-full nav-item p-3.5 rounded-xl text-sm font-bold flex items-center gap-3 bg-cyan-500/20 text-cyan-400 border-l-4 border-cyan-400">
              <span>👨‍🏫</span> 教师后台控制台
            </button>
          )}
          {role === "admin" && (
            <button className="w-full nav-item p-3.5 rounded-xl text-sm font-bold flex items-center gap-3 bg-red-500/20 text-red-400 border-l-4 border-red-400">
              <span>👑</span> Super Admin
            </button>
          )}
        </div>
        <div className="p-6 border-t border-white/5 bg-slate-900/50">
          <div className="text-xs text-slate-400 mb-3 font-bold flex items-center justify-between">
            <span>当前登录:</span>
            <span className="text-cyan-400 truncate max-w-[100px]">{currentUser.username}</span>
          </div>
          <button
            onClick={handleLogout}
            className="w-full bg-red-500/10 text-red-400 border border-red-500/20 py-3 rounded-xl text-sm font-bold hover:bg-red-500/20 hover:text-red-300 transition-all shadow-sm"
          >
            🚪 安全退出
          </button>
        </div>
      </div>

      {/* ── 主内容区 ──────────────────────────────────────────────── */}
      {role === "admin" && <AdminDashboard onLogout={handleLogout} />}

      {role === "student" && (
        <StudentDashboard
          student={db[studentKey]}
          allStudents={db}
          currentMenu={currentMenu}
          streakData={streakData}
          currentUsername={studentKey}       /* ← V28 新增，传递 Firebase key */
          onGameComplete={score => {
            const target = { ...db[studentKey] };
            target.pts = (target.pts || 0) + score;
            handleUpdateStudent(studentKey, target);
          }}
        />
      )}

      {role === "teacher" && <TeacherConsole studentList={db} />}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
