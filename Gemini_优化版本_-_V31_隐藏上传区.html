/* ══════════════════════ 🎵 全量智能数字音效引擎 (Web Audio API 离线合成) ══════════════════════ */
const AudioEngine = {
  ctx: null,
  bgmInterval: null,
  frenzyInterval: null,

  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  },

  _tone(freq, type, start, dur, vol = 0.1) {
    const ctx = this.init();
    if (!ctx) return;
    try {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(vol, start);
      g.gain.exponentialRampToValueAtTime(0.001, start + dur);
      o.connect(g);
      g.connect(ctx.destination);
      o.start(start);
      o.stop(start + dur);
    } catch (e) { /* silent */ }
  },

  /* 清脆选项点击 — 高频电子啵啵 */
  sfxClick() {
    const t = this.init().currentTime;
    this._tone(1400, 'sine', t, 0.035, 0.07);
    this._tone(2200, 'square', t + 0.012, 0.025, 0.04);
  },

  /* 欢快答对金币音 — 上升和弦叮咚 */
  sfxCorrect() {
    const t = this.init().currentTime;
    this._tone(523.25, 'square', t, 0.1, 0.09);
    this._tone(659.25, 'square', t + 0.09, 0.1, 0.09);
    this._tone(783.99, 'square', t + 0.18, 0.14, 0.08);
    this._tone(1046.5, 'sine', t + 0.28, 0.28, 0.07);
  },

  /* 沉闷答错警报 — 低频下沉嗡鸣 */
  sfxWrong() {
    const t = this.init().currentTime;
    this._tone(200, 'sawtooth', t, 0.22, 0.11);
    this._tone(140, 'sawtooth', t + 0.12, 0.3, 0.1);
    this._tone(90, 'triangle', t + 0.22, 0.38, 0.09);
  },

  /* 最后10秒倒计时嘀嗒 — 极具压迫感 */
  sfxTick() {
    const t = this.init().currentTime;
    this._tone(1600, 'square', t, 0.04, 0.1);
    this._tone(800, 'sine', t + 0.02, 0.06, 0.05);
  },

  /* 狂热模式 — 激昂电子连响 */
  sfxFrenzy() {
    this.init();
    if (this.frenzyInterval) clearInterval(this.frenzyInterval);
    const seq = [440, 554, 659, 880, 988, 1174, 988, 880, 659, 554, 659, 880];
    let step = 0;
    this.frenzyInterval = setInterval(() => {
      const ctx = this.ctx;
      if (!ctx) return;
      const now = ctx.currentTime;
      const f = seq[step % seq.length];
      this._tone(f, 'square', now, 0.07, 0.08);
      this._tone(f * 1.5, 'sine', now + 0.02, 0.05, 0.045);
      step++;
      if (step >= seq.length) {
        clearInterval(this.frenzyInterval);
        this.frenzyInterval = null;
      }
    }, 75);
  },

  sfxChest() {
    const t = this.init().currentTime;
    [320, 420, 520, 680, 840, 1000, 1200, 1400].forEach((f, i) => {
      this._tone(f, 'triangle', t + i * 0.045, 0.09, 0.06);
    });
  },

  sfxBoss() {
    const t = this.init().currentTime;
    [160, 130, 100, 75, 55].forEach((f, i) => {
      this._tone(f, 'sawtooth', t + i * 0.09, 0.28, 0.11);
    });
  },

  sfxVictory() { this.sfxCorrect(); },

  startBGM() {
    this.init();
    if (this.bgmInterval) clearInterval(this.bgmInterval);
    let step = 0;
    this.bgmInterval = setInterval(() => {
      const notes = [196, 0, 196, 0, 261.63, 0, 293.66, 0];
      const f = notes[step % 8];
      if (f) this._tone(f, 'triangle', this.ctx.currentTime, 0.14, 0.04);
      step++;
    }, 250);
  },

  stopBGM() {
    if (this.bgmInterval) { clearInterval(this.bgmInterval); this.bgmInterval = null; }
    if (this.frenzyInterval) { clearInterval(this.frenzyInterval); this.frenzyInterval = null; }
  },
};

const LoginStreak = {
  KEY:'bm_streak_v1',
  check(){
    const r=JSON.parse(localStorage.getItem(this.KEY)||'{}');
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();

};

const DailyTasksEngine = {
  KEY:'bm_tasks_v1',
  today(){return new Date().toDateString();},
  getTasks(){
    const r=JSON.parse(localStorage.getItem(this.KEY)||'{}');
    if(r.date===this.today()) return r.tasks||[];
    const pool=[...TASK_POOL].sort(()=>Math.random()-0.5).slice(0,3);
    const tasks=pool.map(t=>({...t,progress:0,completed:false,claimed:false}));
    localStorage.setItem(this.KEY,JSON.stringify({date:this.today(),tasks}));
    return tasks;
  },
  update(type,value){
    const r=JSON.parse(localStorage.getItem(this.KEY)||'{}');
    if(!r.tasks||r.date!==this.today()) return;
    r.tasks=r.tasks.map(t=>{
      if(t.completed) return t;
      if(t.type!==type) return t;
      let progress=t.progress;
      if(type==='correct') progress+=value;
      else if(['maxCombo','speedScore'].includes(type)) progress=Math.max(progress,value);
      else progress=Math.min(progress+value,t.goal);
      return{...t,progress:Math.min(progress,t.goal),completed:progress>=t.goal};
    });
    localStorage.setItem(this.KEY,JSON.stringify(r));
  },
  claimTask(id){
    const r=JSON.parse(localStorage.getItem(this.KEY)||'{}');
    if(!r.tasks) return 0;
    let reward=0;
    r.tasks=r.tasks.map(t=>{if(t.id===id&&t.completed&&!t.claimed){reward=t.reward;return{...t,claimed:true};}return t;});
    localStorage.setItem(this.KEY,JSON.stringify(r));
    return reward;
  }
};

/* ── 装扮掉落概率表（在 chestRewards / gacha 中使用） ─────────────────
   每次正确答题进入 gold 模式盲盒时，有 30% 概率触发装扮掉落。
   掉落后从全池随机，称号 60% / 头像框 40%。
   ─────────────────────────────────────────────────────────────────── */
const COSMETIC_DROP_RATE = 0.30; // 30% 触发概率

/**
 * 随机抽一件装扮（称号或头像框），返回 { type:'title'|'frame', item } 或 null。
 */
const rollCosmeticDrop = () => {
  if (Math.random() > COSMETIC_DROP_RATE) return null;
  if (Math.random() < 0.60) {
    // 称号
    const item = ALL_TITLES[Math.floor(Math.random() * ALL_TITLES.length)];
    return { type: 'title', item };
  } else {
    // 头像框
    const item = ALL_FRAMES[Math.floor(Math.random() * ALL_FRAMES.length)];
    return { type: 'frame', item };
  }
};

/* ── CosmeticsEngine：Firebase 读写封装 ──────────────────────────── */
const CosmeticsEngine = {

  /**
   * 将一件装扮写入学生的 unlockedTitles / unlockedFrames（去重）。
   * @param {string} studentKey  Firebase students/ 节点 key
   * @param {'title'|'frame'} type
   * @param {string} itemId      装扮 id（如 'title_war_god'）
   */
  async unlock(studentKey, type, itemId) {
    const field = type === 'title' ? 'unlockedTitles' : 'unlockedFrames';
    const snap = await database.ref(`students/${studentKey}/${field}`).once('value');
    const current = snap.val() || [];
    if (current.includes(itemId)) return; // 已拥有，跳过
    await database.ref(`students/${studentKey}/${field}`).set([...current, itemId]);
  },

  /**
   * 切换佩戴/卸下称号。
   * @param {string} studentKey
   * @param {string} titleId   传入空字符串表示卸下
   */
  async equipTitle(studentKey, titleId) {
    await database.ref(`students/${studentKey}/equippedTitle`).set(titleId);
  },

  /**
   * 切换佩戴/卸下头像框。
   */
  async equipFrame(studentKey, frameId) {
    await database.ref(`students/${studentKey}/equippedFrame`).set(frameId);
  },
};



/* ══════════════════════ 图表引擎 ══════════════════════ */
const RadarChart = ({scores}) => {
  const cx=240,cy=125,rMax=68;
  const props=[{key:'kosakata',bm:'1. KOSA KATA'},{key:'pemahaman',bm:'2. PEMAHAMAN'},{key:'kbat',bm:'3. KBAT'},{key:'tatabahasa',bm:'4. TATABAHASA'},{key:'penulisan',bm:'5. PENULISAN'},{key:'teknik',bm:'6. TEKNIK MENJAWAB'}];
  const safeScores=scores||{};
  const getCoord=(index,radius)=>{const angle=(Math.PI*2/props.length)*index-Math.PI/2;return[cx+radius*Math.cos(angle),cy+radius*Math.sin(angle)];};
  const gridCircles=[0.25,0.5,0.75,1].map(level=>Array.from({length:props.length}).map((_,i)=>getCoord(i,rMax*level)).map(p=>p.join(',')).join(' '));
  const dataPoints=props.map((p,i)=>getCoord(i,((Number(safeScores[p.key])||0)/100)*rMax));
  const dataPath=dataPoints.map(p=>p.join(',')).join(' ')+' '+dataPoints[0].join(',');
  return (
    <svg viewBox="0 0 480 255" style={{width:'100%',height:'auto',display:'block',overflow:'visible'}}>
      {gridCircles.map((points,idx)=><polygon key={idx} points={points} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1.2"/>)}
      {props.map((p,i)=>{const[x,y]=getCoord(i,rMax);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.12)" strokeWidth="1.2"/>;} )}
      <polygon points={dataPath} fill="rgba(6,182,212,0.2)" stroke="#22d3ee" strokeWidth="2.5" strokeLinejoin="round"/>
      {props.map((p,i)=>{let[x,y]=getCoord(i,rMax+18);let anchor="middle";if(x<cx-15){anchor="end";x-=7;}else if(x>cx+15){anchor="start";x+=7;}let y1=y-2,y2=y+10;if(i===0){y1-=5;y2-=5;}if(i===3){y1+=5;y2+=5;}return(<g key={i}><text x={x} y={y1} fill="#ffffff" fontSize="13" fontWeight="900" textAnchor={anchor}>{p.bm}</text><text x={x} y={y2} fill="#94a3b8" fontSize="12" fontWeight="700" textAnchor={anchor}>{safeScores[p.key]||0}%</text></g>);})}
    </svg>
  );
};

const GameEngine = ({
  mode,
  onExit,
  onGameComplete,
  onTaskEvent,
  studentKey,          // ← 新增 prop：Firebase 节点 key（用于写装扮）
  onCosmeticDrop,      // ← 新增 prop：(drop: {type,item}) => void，通知父组件刷新装扮
}) => {
  const [questions,       setQuestions]       = useState([]);
  const [qIdx,            setQIdx]            = useState(0);
  const [score,           setScore]           = useState(0);
  const [lives,           setLives]           = useState(mode === 'speed' ? 999 : 3);
  const [gameState,       setGameState]       = useState("start");
  const [combo,           setCombo]           = useState(0);
  const [timeLeft,        setTimeLeft]        = useState(60);
  const [feedback,        setFeedback]        = useState(null);
  const [answerLocked,    setAnswerLocked]    = useState(false);
  const [correctInRow,    setCorrectInRow]    = useState(0);
  const [activeChests,    setActiveChests]    = useState([]);
  const [pendingDrops,    setPendingDrops]    = useState([]); // 本局掉落的装扮列表
  const [showDropModal,   setShowDropModal]   = useState(false); // 结算装扮弹窗

  // Boss
  const [bossQs,    setBossQs]    = useState([]);
  const [bossQIdx,  setBossQIdx]  = useState(0);
  const [bossTimer, setBossTimer] = useState(10);
  const [bossWon,   setBossWon]   = useState(false);
  const bossRef = useRef({ won: false, livesAfter: 3 });

  /* ── 盲盒奖励池：积分奖励 + 装扮触发 ────────────────────────────── */
  const buildChestRewards = () => {
    const base = [
      { type: 'pts',    val: 150,  label: '+150 PTS',                color: 'text-emerald-400' },
      { type: 'pts',    val: 50,   label: '+50 PTS',                 color: 'text-emerald-400' },
      { type: 'pts',    val: 300,  label: '💰 MEGA JACKPOT +300!',   color: 'text-yellow-400'  },
      { type: 'steal',  val: -20,  label: '😈 偷分大盗! -20% PTS',   color: 'text-red-500'     },
      { type: 'double', val: 0,    label: '🔥 积分翻倍！(上限+500)', color: 'text-orange-400'  },
    ];

    // 掷骰子：是否注入一个装扮奖励槽
    const drop = rollCosmeticDrop();
    if (drop) {
      base.push({
        type:  'cosmetic',
        val:   0,
        drop:  drop,   // { type:'title'|'frame', item }
        label: `🎁 稀有装扮掉落！${drop.item.label}`,
        color: 'text-yellow-300',
      });
    }

    // 随机取 3 个给玩家选
    return [...base].sort(() => Math.random() - 0.5).slice(0, 3);
  };

  /* ── 加载题目 ────────────────────────────────────────────────────── */
  useEffect(() => {
    database.ref('settings/arcadeQuestions').once('value').then(snap => {
      let qs = snap.exists() ? snap.val() : DEFAULT_QUESTIONS;
      const fresh = QuestionCooldown.filterFresh(qs);
      let pool = [...fresh].sort(() => Math.random() - 0.5);
      while (pool.length < 20) pool = pool.concat(fresh);
      setQuestions(pool.slice(0, 20));
    });
    return () => AudioEngine.stopBGM();
  }, []);

  /* ── 答题锁定 ────────────────────────────────────────────────────── */
  useEffect(() => {
    if (gameState === 'playing' || gameState === 'boss_battle') {
      setAnswerLocked(true);
      const t = setTimeout(() => setAnswerLocked(false), 2000);
      return () => clearTimeout(t);
    }
  }, [qIdx, gameState]);

  /* ── 限时计时器 ──────────────────────────────────────────────────── */
  useEffect(() => {
    let t;
    if (gameState === "playing" && mode === 'speed' && timeLeft > 0) {
      t = setTimeout(() => {
        setTimeLeft(timeLeft - 1);
        if (timeLeft <= 10) AudioEngine.sfxTick();
      }, 1000);
    } else if (timeLeft === 0 && gameState === "playing" && mode === 'speed') {
      setGameState("result");
      AudioEngine.stopBGM();
    }
    return () => clearTimeout(t);
  }, [timeLeft, gameState, mode]);

  /* ── Boss 前奏 ───────────────────────────────────────────────────── */
  useEffect(() => {
    if (gameState !== 'boss_intro') return;
    AudioEngine.sfxBoss();
    AudioEngine.sfxFrenzy();
    const t = setTimeout(() => { setGameState('boss_battle'); setBossTimer(10); }, 2500);
    return () => clearTimeout(t);
  }, [gameState]);

  /* ── Boss 计时 ───────────────────────────────────────────────────── */
  useEffect(() => {
    if (gameState !== 'boss_battle') return;
    if (bossTimer <= 0) {
      const newLives = mode !== 'speed' ? Math.max(0, lives - 1) : lives;
      if (mode !== 'speed') setLives(newLives);
      bossRef.current = { won: false, livesAfter: newLives };
      setBossWon(false);
      setGameState('boss_result');
      return;
    }
    const t = setTimeout(() => setBossTimer(p => p - 1), 1000);
    return () => clearTimeout(t);
  }, [bossTimer, gameState, lives, mode]);

  /* ── Boss 结算 → 恢复游戏 ───────────────────────────────────────── */
  useEffect(() => {
    if (gameState !== 'boss_result') return;
    const t = setTimeout(() => {
      setCorrectInRow(0);
      const { won, livesAfter } = bossRef.current;
      if (!won && mode !== 'speed' && livesAfter <= 0) {
        setGameState('result');
        AudioEngine.stopBGM();
      } else {
        if (qIdx + 1 < questions.length) setQIdx(p => p + 1);
        else { setGameState('result'); AudioEngine.stopBGM(); return; }
        setGameState('playing');
      }
    }, 2500);
    return () => clearTimeout(t);
  }, [gameState, questions.length]);

  /* ── 开始游戏 ────────────────────────────────────────────────────── */
  const startGame = () => {
    AudioEngine.sfxClick();
    AudioEngine.startBGM();
    setScore(0);
    setQIdx(0);
    setGameState("playing");
    setTimeLeft(60);
    setCombo(0);
    setLives(mode === 'speed' ? 999 : 3);
    setCorrectInRow(0);
    setPendingDrops([]);
  };

  /* ── 下一题 ──────────────────────────────────────────────────────── */
  const nextQuestion = () => {
    if (qIdx + 1 < questions.length) {
      setQIdx(p => p + 1);
      if (mode === 'gold') setGameState("playing");
    } else {
      setGameState("result");
      AudioEngine.stopBGM();
    }
  };

  /* ── 答题处理 ────────────────────────────────────────────────────── */
  const handleAnswer = (selIdx) => {
    if (answerLocked) return;
    const q = questions[qIdx];
    const isCorrect = selIdx === q.ans;

    if (isCorrect) {
      AudioEngine.sfxCorrect();
      const newCombo = Math.min(combo + 1, 8);
      if (newCombo === 8) AudioEngine.sfxFrenzy();
      setCombo(newCombo);
      const newRow = correctInRow + 1;
      setCorrectInRow(newRow);
      onTaskEvent?.('correct', 1);
      onTaskEvent?.('maxCombo', newCombo);
      const pts = mode === 'speed' ? (50 * newCombo) : 100;

      // Boss 触发（每 5 连击，非 speed 模式）
      if (mode !== 'speed' && newRow % 5 === 0) {
        setScore(p => p + pts);
        const pool = [...questions].filter((_, i) => i !== qIdx).sort(() => Math.random() - 0.5).slice(0, 3);
        setBossQs(pool.length >= 3 ? pool : questions.slice(0, 3));
        setBossQIdx(0);
        setGameState('boss_intro');
        return;
      }

      // Gold 模式 → 进入盲盒选择
      if (mode === 'gold') {
        const rc = buildChestRewards(); // ← 使用新的构造函数（含装扮掉落）
        setActiveChests(rc);
        setGameState("chest");
      } else {
        setScore(p => p + pts);
        setFeedback({
          msg: `🎉 答对了！ +${pts} PTS! 连击 x${newCombo}${newCombo === 8 ? ' 🔥MAX' : ''}`,
          color: 'text-emerald-400',
        });
        setTimeout(() => { setFeedback(null); nextQuestion(); }, 800);
      }
    } else {
      AudioEngine.sfxWrong();
      setCombo(0);
      setCorrectInRow(0);
      if (mode !== 'speed') setLives(p => p - 1);
      setFeedback({
        msg: `❌ 答错了！正确答案: ${q.opts[q.ans]}`,
        color: 'text-red-500',
      });
      setTimeout(() => {
        setFeedback(null);
        if (mode !== 'speed' && lives <= 1) { setGameState("result"); AudioEngine.stopBGM(); }
        else nextQuestion();
      }, 1500);
    }
  };

  /* ── Boss 答题处理 ───────────────────────────────────────────────── */
  const handleBossAnswer = (selIdx) => {
    if (answerLocked) return;
    const q = bossQs[bossQIdx];
    if (!q) return;
    if (selIdx === q.ans) {
      AudioEngine.sfxCorrect();
      if (bossQIdx + 1 >= 3) {
        setScore(p => p + 300);
        bossRef.current = { won: true, livesAfter: lives };
        setBossWon(true);
        setGameState('boss_result');
        onTaskEvent?.('bossKill', 1);
        AudioEngine.sfxVictory();
      } else {
        setBossQIdx(p => p + 1);
      }
    } else {
      AudioEngine.sfxWrong();
      const newLives = mode !== 'speed' ? Math.max(0, lives - 1) : lives;
      if (mode !== 'speed') setLives(newLives);
      bossRef.current = { won: false, livesAfter: newLives };
      setBossWon(false);
      setGameState('boss_result');
    }
  };

  /* ── 盲盒点击处理（含装扮掉落写入） ─────────────────────────────── */
  const handleChestClick = async (reward) => {
    AudioEngine.sfxChest();
    let add = 0;
    if (reward.type === 'pts')   add = reward.val;
    if (reward.type === 'double') add = Math.min(score, 500);
    if (reward.type === 'steal')  add = -Math.floor(score * 0.2);

    // 装扮掉落
    if (reward.type === 'cosmetic') {
      AudioEngine.sfxVictory();
      const drop = reward.drop;
      // 写入 Firebase（非阻塞，失败不影响游戏流程）
      if (studentKey) {
        try {
          await CosmeticsEngine.unlock(studentKey, drop.type, drop.item.id);
          onCosmeticDrop?.(drop);
        } catch (e) { /* silent fail */ }
      }
      // 记录到本局待展示列表
      setPendingDrops(prev => [...prev, drop]);
    }

    setScore(p => Math.max(0, p + add));
    setFeedback({ msg: reward.label, color: reward.color });
    setTimeout(() => { setFeedback(null); nextQuestion(); }, 1800);
  };

  /* ── 结算积分提交 ────────────────────────────────────────────────── */
  const handleSubmitScore = () => {
    AudioEngine.sfxClick();
    const multiplier  = DailyLimits.getMultiplier(mode);
    const remaining   = DailyLimits.getRemainingToday(mode);
    const finalScore  = Math.min(Math.floor(score * multiplier), remaining);
    DailyLimits.recordGame(mode, finalScore);
    QuestionCooldown.markSeen(questions);
    if (mode === 'gold')              onTaskEvent?.('goldComplete', 1);
    if (mode === 'gold' && lives === 3) onTaskEvent?.('flawlessGold', 1);
    if (mode === 'speed')             onTaskEvent?.('speedScore', score);

    // 如果本局有装扮掉落，先弹窗展示，再回调
    if (pendingDrops.length > 0) {
      setShowDropModal(true);
    } else {
      onGameComplete(finalScore);
    }
  };

  /* ── 装扮弹窗确认后 ─────────────────────────────────────────────── */
  const handleDropModalClose = () => {
    const multiplier  = DailyLimits.getMultiplier(mode);
    const remaining   = DailyLimits.getRemainingToday(mode);
    const finalScore  = Math.min(Math.floor(score * multiplier), remaining);
    setShowDropModal(false);
    onGameComplete(finalScore);
  };

  /* ════════════════════════════════════════════════════════════════════
     渲染层
     ════════════════════════════════════════════════════════════════════ */

  if (questions.length === 0) {
    return (
      <div className="w-full h-full flex items-center justify-center bg-black">
        <span className="text-cyan-400 animate-pulse font-mono">📡 正在连接云端题库...</span>
      </div>
    );
  }

  /* ── 装扮掉落弹窗 ────────────────────────────────────────────────── */
  if (showDropModal) {
    return (

  /* ── RESULT ──────────────────────────────────────────────────────── */
  if (gameState === "result") {

        )}

        <button

          className="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-black px-12 py-5 rounded-2xl text-xl font-black shadow-[0_10px_30px_rgba(16,185,129,0.3)] transition-transform hover:-translate-y-1"

    );
  }

  return null;
};

/* ══════════════════════ 🔗 词汇连线游戏 ══════════════════════ */
const VocabMatchGame = ({onExit, onGameComplete, onTaskEvent}) => {
  const PAIRS = 6; const ROUNDS = 3; const ROUND_TIME = 90;
  const [gameState, setGameState] = useState('start');
  const [round, setRound] = useState(1);
  const [leftItems, setLeftItems] = useState([]);
  const [rightItems, setRightItems] = useState([]);
  const [matched, setMatched] = useState(new Set());
  const [selectedLeft, setSelectedLeft] = useState(null);
  const [wrongLeft, setWrongLeft] = useState(null);
  const [wrongRight, setWrongRight] = useState(null);
  const [correctPair, setCorrectPair] = useState(null);
  const [timer, setTimer] = useState(ROUND_TIME);
  const [score, setScore] = useState(0);
  const [lastBonus, setLastBonus] = useState(0);

  const startRound = (roundNum) => {
    const pool = [...BM_VOCAB].sort(() => Math.random() - 0.5).slice(0, PAIRS);
    setLeftItems([...pool].sort(() => Math.random() - 0.5));
    setRightItems([...pool].sort(() => Math.random() - 0.5));
    setMatched(new Set()); setSelectedLeft(null); setWrongLeft(null); setWrongRight(null); setCorrectPair(null);
    setTimer(ROUND_TIME); setRound(roundNum); setGameState('playing');
    AudioEngine.startBGM();
  };

  useEffect(() => {
    if (gameState !== 'playing') return;
    if (timer <= 0) { setLastBonus(0); setGameState('roundEnd'); AudioEngine.stopBGM(); return; }
    const t = setTimeout(() => setTimer(p => p - 1), 1000);
    return () => clearTimeout(t);
  }, [timer, gameState]);

  useEffect(() => {
    if (gameState === 'playing' && matched.size === PAIRS) {
      const bonus = timer * 2;
      setScore(p => p + bonus); setLastBonus(bonus);
      setGameState('roundEnd'); AudioEngine.stopBGM();
    }
  }, [matched, gameState, timer]);

  const handleLeft = (item) => {
    if (matched.has(item.word) || gameState !== 'playing') return;
    AudioEngine.sfxClick(); setSelectedLeft(item.word); setWrongLeft(null); setWrongRight(null);
  };

  const handleRight = (item) => {
    if (matched.has(item.word) || gameState !== 'playing' || !selectedLeft) return;
    AudioEngine.sfxClick();
    if (item.word === selectedLeft) {
      AudioEngine.sfxCorrect();
      setCorrectPair(item.word);
      setTimeout(() => { setMatched(p => new Set([...p, item.word])); setCorrectPair(null); }, 500);
      setScore(p => p + 100); onTaskEvent?.('correct', 1);
      setSelectedLeft(null);
    } else {
      AudioEngine.sfxWrong();
      setWrongLeft(selectedLeft); setWrongRight(item.word);
      setTimeout(() => { setWrongLeft(null); setWrongRight(null); setSelectedLeft(null); }, 600);
    }
  };

  const handleNext = () => {
    AudioEngine.sfxClick();
    if (round >= ROUNDS) setGameState('result');
    else startRound(round + 1);
  };

  const handleSubmit = () => {
    AudioEngine.sfxClick();
    const multiplier = DailyLimits.getMultiplier('vocab');
    const remaining = DailyLimits.getRemainingToday('vocab');
    const finalScore = Math.min(Math.floor(score * multiplier), remaining);
    DailyLimits.recordGame('vocab', finalScore);
    onTaskEvent?.('vocabComplete', 1);
    onGameComplete(finalScore);
  };

  if (gameState === 'start') return (
    <div className="w-full h-full flex flex-col items-center justify-center bg-[#0a0f1d] p-8 text-center border-4 border-violet-500/30 rounded-3xl relative">
      <button onClick={onExit} className="absolute top-6 left-6 bg-white/10 px-4 py-2 rounded-xl text-slate-300 font-bold hover:bg-white/20">⬅️ 返回大厅</button>
      <div className="text-6xl mb-6">🔗</div>
      <h1 className="text-4xl font-black text-white mb-4">词汇连线 Kata Match</h1>
      <p className="text-violet-300 mb-6 max-w-md leading-relaxed">左边是 BM 单词，右边是中文意思。<br/>先点一个单词，再点对应的意思——全部配对即过关！</p>
      <div className="flex gap-4 mb-8 text-sm">
        {[['3','回合'],['90s','每回合'],['+100','每对配对'],['+时间分','完美清空']].map(([v,l])=>(
          <div key={l} className="bg-violet-900/30 border border-violet-500/30 px-5 py-3 rounded-xl text-center">
            <div className="text-2xl font-black text-violet-300">{v}</div><div className="text-slate-400 text-xs mt-1">{l}</div>
          </div>
        ))}
      </div>
      <button onClick={() => { AudioEngine.sfxClick(); startRound(1); }} className="bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white px-12 py-5 rounded-2xl text-xl font-black shadow-[0_10px_30px_rgba(139,92,246,0.4)] transition-transform hover:-translate-y-1">🔗 开始连线</button>
    </div>
  );

  if (gameState === 'roundEnd') return (
    <div className="w-full h-full flex flex-col items-center justify-center bg-[#0a0f1d] p-8 text-center rounded-3xl">
      <div className="text-6xl mb-4 animate-popIn">{matched.size === PAIRS ? '⭐' : '⏰'}</div>
      <h2 className="text-3xl font-black text-white mb-2">{matched.size === PAIRS ? '全部配对成功！' : '时间到！'}</h2>
      <p className="text-slate-400 mb-2 text-sm">第 {round} / {ROUNDS} 回合</p>
      {lastBonus > 0 && <p className="text-amber-400 font-bold mb-4 text-sm">⚡ 时间奖励 +{lastBonus} PTS</p>}
      <p className="text-5xl font-black text-amber-400 font-mono mb-10">累计 {score} PTS</p>
      {round < ROUNDS
        ? <button onClick={handleNext} className="bg-gradient-to-r from-violet-600 to-purple-600 text-white px-12 py-5 rounded-2xl text-xl font-black">➡️ 下一回合</button>
        : <button onClick={() => setGameState('result')} className="bg-gradient-to-r from-emerald-500 to-teal-500 text-black px-12 py-5 rounded-2xl text-xl font-black">🏁 查看最终结果</button>}
    </div>
  );

  if (gameState === 'result') {
    const multiplier = DailyLimits.getMultiplier('vocab');
    const remaining = DailyLimits.getRemainingToday('vocab');
    const finalScore = Math.min(Math.floor(score * multiplier), remaining);
    return (
      <div className="w-full h-full flex flex-col items-center justify-center bg-[#0a0f1d] p-8 text-center rounded-3xl">
        <div className="text-6xl mb-4 animate-popIn">🎉</div>
        <h2 className="text-3xl font-black text-white mb-2">词汇连线完成！</h2>
        <p className="text-slate-400 mb-4 text-sm">共完成 {ROUNDS} 回合</p>
        <p className="text-7xl text-amber-400 font-mono font-black mb-6">{score}</p>
        {multiplier < 1 && <div className="text-amber-400 text-sm mb-4 bg-amber-950/30 px-4 py-2 rounded-xl">×{multiplier} 递减收益 → 实际入账 {finalScore} PTS</div>}
        <button onClick={handleSubmit} className="bg-gradient-to-r from-emerald-500 to-teal-500 text-black px-12 py-5 rounded-2xl text-xl font-black">💰 将积分存入云端账户</button>
      </div>
    );
  }

  // playing
  return (
    <div className="w-full h-full flex flex-col bg-[#060415] rounded-3xl border-2 border-violet-800/50 p-4 overflow-hidden">
      <div className="flex justify-between items-center bg-slate-900/80 p-3 rounded-2xl mb-4">
        <span className="text-amber-400 font-black text-lg">💎 {score} PTS</span>
        <span className="text-violet-300 font-bold text-sm">回合 {round}/{ROUNDS} · 剩余 {PAIRS - matched.size} 对</span>
        <span className={`text-xl font-black font-mono ${timer <= 15 ? 'text-red-400 animate-pulse' : 'text-cyan-400'}`}>⏱ {timer}s</span>
      </div>
      <div className="flex-1 grid grid-cols-2 gap-3 overflow-hidden">
        <div className="flex flex-col gap-2">
          <div className="text-center text-xs font-black text-violet-400 tracking-widest mb-1">BM PERKATAAN</div>
          {leftItems.map(item => {
            const isMatched = matched.has(item.word);
            const isSel = selectedLeft === item.word;
            const isWrong = wrongLeft === item.word;
            const isCorrect = correctPair === item.word;
            return (
              <button key={item.word} onClick={() => handleLeft(item)} disabled={isMatched}
                className={`p-3 rounded-xl font-black text-base border-2 transition-all text-center
                  ${isMatched ? 'invisible pointer-events-none' : ''}
                  ${isCorrect ? 'bg-emerald-600 border-emerald-400 scale-105' : ''}
                  ${isWrong ? 'bg-red-600/50 border-red-500 animate-wrongFlash' : ''}
                  ${isSel && !isWrong && !isCorrect ? 'bg-violet-600 border-violet-400 scale-105 shadow-[0_0_20px_rgba(139,92,246,0.5)]' : ''}
                  ${!isMatched && !isSel && !isWrong && !isCorrect ? 'bg-slate-800/60 border-slate-600 text-white hover:border-violet-500 hover:bg-violet-900/30' : ''}`}>
                {item.word}
              </button>
            );
          })}
        </div>
        <div className="flex flex-col gap-2">
          <div className="text-center text-xs font-black text-cyan-400 tracking-widest mb-1">中文意思</div>
          {rightItems.map(item => {
            const isMatched = matched.has(item.word);
            const isWrong = wrongRight === item.word;
            const isCorrect = correctPair === item.word;
            return (
              <button key={item.word} onClick={() => handleRight(item)} disabled={isMatched || !selectedLeft}
                className={`p-3 rounded-xl font-bold text-sm border-2 transition-all text-center
                  ${isMatched ? 'invisible pointer-events-none' : ''}
                  ${isCorrect ? 'bg-emerald-600 border-emerald-400 scale-105' : ''}
                  ${isWrong ? 'bg-red-600/50 border-red-500 animate-wrongFlash' : ''}
                  ${!isMatched && !isWrong && !isCorrect ? (selectedLeft ? 'bg-slate-800/60 border-slate-600 text-cyan-200 hover:border-cyan-500 hover:bg-cyan-900/30 cursor-pointer' : 'bg-slate-800/30 border-slate-700 text-slate-500 cursor-not-allowed') : ''}`}>
                {item.meaning}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

          <div key={task.id} className={`p-4 rounded-2xl border transition-all ${task.claimed ? 'bg-slate-950/40 border-white/5 opacity-60' : task.completed ? 'bg-emerald-950/30 border-emerald-500/30' : 'bg-slate-950/60 border-white/5'}`}>

              </div>
              <div className="shrink-0">
                {task.claimed
                  ? <span className="text-emerald-500 font-black text-xs">✅ 已领</span>

const Leaderboard = ({allStudents, currentStudentId}) => {
  const sorted = Object.values(allStudents || {})
    .filter(s => s.name && typeof s.pts === 'number')
    .sort((a, b) => (b.pts||0) - (a.pts||0))
    .slice(0, 10);
  const rankMedal = ['🥇','🥈','🥉'];
  const rankBg = ['from-yellow-900/40 border-yellow-500/40','from-slate-700/40 border-slate-400/40','from-orange-900/40 border-orange-600/40'];
  return (
    <div className="bg-[#0a0f1d] border border-indigo-500/20 rounded-3xl p-5">
      <h3 className="text-base font-black text-indigo-400 mb-4 flex items-center gap-2">🌍 全体排行榜 <span className="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded font-bold">TOP 10</span></h3>
      <div className="space-y-2">
        {sorted.map((s, idx) => {
          const isMe = s.id === currentStudentId;
          const bg = idx < 3 ? `bg-gradient-to-r ${rankBg[idx]}` : 'bg-slate-950/60 border-white/5';
          return (
            <div key={s.id||idx} className={`flex justify-between items-center px-4 py-2.5 rounded-xl border ${bg} ${isMe ? 'ring-1 ring-cyan-400/50' : ''}`}>
              <div className="flex items-center gap-3">
                <span className="text-lg w-6 text-center">{idx < 3 ? rankMedal[idx] : <span className="text-slate-500 font-black text-sm">{idx+1}</span>}</span>
                <span className="font-bold text-sm">{s.name} {isMe && <span className="text-[9px] bg-cyan-500 text-black px-1.5 py-0.5 rounded ml-1 font-black">YOU</span>}</span>
              </div>
              <span className="font-mono font-black text-sm text-amber-400">{s.pts||0} <span className="text-[9px] opacity-60">PTS</span></span>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ══════════════════════ 👑 Admin ══════════════════════ */
const AdminDashboard = ({onLogout}) => {
  const [adminTab,        setAdminTab]        = useState("accounts");
  const [authUsers,       setAuthUsers]       = useState({});
  const [batchText,       setBatchText]       = useState("");
  const [singleName,      setSingleName]      = useState("");
  const [singlePwd,       setSinglePwd]       = useState("");
  const [singleRole,      setSingleRole]      = useState("student");
  const [singleClassTime, setSingleClassTime] = useState("");
  const [arcadeQuestions, setArcadeQuestions] = useState([]);
  const [newQ,            setNewQ]            = useState("");
  const [newOptA,         setNewOptA]         = useState("");
  const [newOptB,         setNewOptB]         = useState("");
  const [newOptC,         setNewOptC]         = useState("");  // 选填
  const [newOptD,         setNewOptD]         = useState("");  // 选填
  const [newAns,          setNewAns]          = useState(0);
  // 题目编辑状态
  const [editingQIdx,     setEditingQIdx]     = useState(null); // 正在编辑的题目索引
  const [editQ,           setEditQ]           = useState("");   // 编辑中的题目内容
  const [editOpts,        setEditOpts]        = useState(["A","B","C","D"]); // 编辑中的选项
  const [editAns,         setEditAns]         = useState(0);   // 编辑中的正确答案

  /* ── 功能一：班级选项管理（结构化版） ──────────────────────── */
  const [classOptions,  setClassOptions]  = useState([]);   // [{id,level,code,day,timeStart,timeEnd,ampm,type,label}]
  // 新班级表单字段
  const [clsLevel,      setClsLevel]      = useState("小学");
  const [clsCode,       setClsCode]       = useState("P456");
  const [clsCodeCustom, setClsCodeCustom] = useState("");   // 自定义代号输入
  const [clsDay,        setClsDay]        = useState("星期一");
  const [clsStart,      setClsStart]      = useState("8:00");
  const [clsEnd,        setClsEnd]        = useState("9:30");
  const [clsAmpm,       setClsAmpm]       = useState("PM");
  const [clsType,       setClsType]       = useState("综合班");
  // 编辑状态
  const [editingClsId,  setEditingClsId]  = useState(null); // 正在编辑的班级 id

  /* ── 功能二：文件上传抽题 ───────────────────────────────────── */
  const [uploadState,     setUploadState]     = useState("idle"); // idle | parsing | preview | uploading
  const [parsedQuestions, setParsedQuestions] = useState([]);     // AI 识别出的题目列表（待审核）
  const [uploadError,     setUploadError]     = useState("");

  /* ── Firebase 监听 ──────────────────────────────────────────── */
  useEffect(() => {
    const refU = database.ref('users');
    const lU   = refU.on('value', snap => { if (snap.exists()) setAuthUsers(snap.val()); });
    const refQ = database.ref('settings/arcadeQuestions');
    const lQ   = refQ.on('value', snap => { if (snap.exists()) setArcadeQuestions(snap.val() || []); });
    const refC = database.ref('settings/classOptions');
    const lC   = refC.on('value', snap => {
      if (snap.exists()) {
        // 存为对象数组，Firebase 可能返回 plain array 或 object
        const val = snap.val();
        const arr = Array.isArray(val) ? val : Object.values(val);
        setClassOptions(arr.filter(Boolean));
      } else {
        setClassOptions([]);
      }
    });
    return () => { refU.off('value', lU); refQ.off('value', lQ); refC.off('value', lC); };
  }, []);

  /* ── 班级管理：构建 label 字符串 ────────────────────────────── */
  const buildClassLabel = (level, code, day, start, end, ampm, type) => {
    const finalCode = code === '自定义' ? clsCodeCustom.trim() : code;
    return `${level} ${finalCode} | ${day} ${start}-${end}${ampm} | ${type}`;
  };

  /* ── 班级管理：新增 ─────────────────────────────────────────── */
  const handleAddClass = async () => {
    const finalCode = clsCode === '自定义' ? clsCodeCustom.trim() : clsCode;
    if (!finalCode) { alert("请输入班级代号！"); return; }
    if (!clsStart.trim() || !clsEnd.trim()) { alert("请填写上课时间！"); return; }
    const label = `${clsLevel} ${finalCode} | ${clsDay} ${clsStart.trim()}-${clsEnd.trim()}${clsAmpm} | ${clsType}`;
    // 检查重复
    if (classOptions.some(c => c.label === label)) { alert("❌ 此班级已存在！"); return; }
    const newCls = {
      id:        Date.now().toString(),
      level:     clsLevel,
      code:      finalCode,
      day:       clsDay,
      timeStart: clsStart.trim(),
      timeEnd:   clsEnd.trim(),
      ampm:      clsAmpm,
      type:      clsType,
      label,
    };
    const updated = [...classOptions, newCls];
    await database.ref('settings/classOptions').set(updated);
    AudioEngine.sfxCorrect();
    // 重置表单（保留 level/code 方便连续新增同类班级）
    setClsStart("8:00"); setClsEnd("9:30");
  };

  /* ── 班级管理：删除 ─────────────────────────────────────────── */
  const handleDeleteClass = async (id) => {
    const cls = classOptions.find(c => c.id === id);
    if (!cls) return;
    if (!window.confirm(`确定删除班级「${cls.label}」？

已分配到此班级的学生不受影响，仅移除此选项。`)) return;
    const updated = classOptions.filter(c => c.id !== id);
    await database.ref('settings/classOptions').set(updated.length ? updated : null);
    AudioEngine.sfxClick();
  };

  /* ── 班级管理：开始编辑 ─────────────────────────────────────── */
  const handleStartEditClass = (cls) => {
    setEditingClsId(cls.id);
    setClsLevel(cls.level);
    setClsCode(['P456','F123','F45'].includes(cls.code) ? cls.code : '自定义');
    setClsCodeCustom(['P456','F123','F45'].includes(cls.code) ? '' : cls.code);
    setClsDay(cls.day);
    setClsStart(cls.timeStart);
    setClsEnd(cls.timeEnd);
    setClsAmpm(cls.ampm || 'PM');
    setClsType(cls.type);
    AudioEngine.sfxClick();
  };

  /* ── 班级管理：确认编辑 ─────────────────────────────────────── */
  const handleConfirmEditClass = async () => {
    const finalCode = clsCode === '自定义' ? clsCodeCustom.trim() : clsCode;
    if (!finalCode) { alert("请输入班级代号！"); return; }
    if (!clsStart.trim() || !clsEnd.trim()) { alert("请填写上课时间！"); return; }
    const label = `${clsLevel} ${finalCode} | ${clsDay} ${clsStart.trim()}-${clsEnd.trim()}${clsAmpm} | ${clsType}`;
    const updated = classOptions.map(c =>
      c.id === editingClsId
        ? { ...c, level: clsLevel, code: finalCode, day: clsDay, timeStart: clsStart.trim(), timeEnd: clsEnd.trim(), ampm: clsAmpm, type: clsType, label }
        : c
    );
    await database.ref('settings/classOptions').set(updated);
    setEditingClsId(null);
    AudioEngine.sfxCorrect();
  };

  /* ── 班级管理：取消编辑 ─────────────────────────────────────── */
  const handleCancelEditClass = () => {
    setEditingClsId(null);
    AudioEngine.sfxClick();
  };

  /* ── 开户 ───────────────────────────────────────────────────── */
  const createAccount = async (uName, uPwd, uRole, uClass) => {
    const cn = uName.trim(); if (!cn || !uPwd) return;
    const up = {}; up[`users/${cn}`] = { password: uPwd.trim(), role: uRole };
    if (uRole === "student") {
      const dbSnap = await database.ref(`students/${cn}`).once('value');
      if (!dbSnap.exists()) {
        up[`students/${cn}`] = { ...DEFAULT_STUDENTS["student_1"], id: cn, name: cn, classTime: uClass || "Unassigned", pts: 0 };
      }
    }
    return database.ref().update(up);
  };

  const handleSingleAdd = async (e) => {
    e.preventDefault();
    if (authUsers[singleName]) return alert("❌ 账号已存在！");
    await createAccount(singleName, singlePwd, singleRole, singleClassTime);
    setSingleName(""); setSinglePwd(""); setSingleClassTime("");
    AudioEngine.sfxCorrect();
    alert("✅ 极速开户成功！");
  };

  const handleBatchAdd = async () => {
    if (!batchText.trim()) return;
    const lines = batchText.split('\n'); let ok = 0;
    for (let line of lines) {
      const parts = line.split(',');
      if (parts.length >= 3) { await createAccount(parts[0], parts[1], parts[2].trim().toLowerCase()); ok++; }
    }
    setBatchText(""); alert(`✅ 成功创建 ${ok} 个账号。`);
  };

  const handleDelete = (uName) => {
    if (uName === "admin") return;
    if (window.confirm(`确定删除【${uName}】？`)) database.ref(`users/${uName}`).remove();
  };

  const handleResetPwd = (uName) => {
    if (window.confirm(`确定重置？`)) { database.ref(`users/${uName}/password`).set("123"); alert(`✅ 已重置为 123`); }
  };

  /* ── 手动新增单题 ───────────────────────────────────────────── */
  const handleAddQuestion = (e) => {
    e.preventDefault();
    if (!newQ.trim() || !newOptA.trim() || !newOptB.trim()) return alert("请填写题目及至少 A、B 两个选项！");
    // 收集非空选项（A/B 必填，C/D 选填）
    const opts = [newOptA.trim(), newOptB.trim()];
    if (newOptC.trim()) opts.push(newOptC.trim());
    if (newOptD.trim()) opts.push(newOptD.trim());
    const ans = Number(newAns);
    if (ans >= opts.length) return alert("正确答案索引超出选项数量，请重新选择！");
    const obj = { q: newQ.trim(), opts, ans };
    database.ref('settings/arcadeQuestions').set([...arcadeQuestions, obj]).then(() => {
      setNewQ(""); setNewOptA(""); setNewOptB(""); setNewOptC(""); setNewOptD(""); setNewAns(0);
      alert("✅ 题目已存入云端！");
    });
  };

  const handleDeleteQ = (idx) => {
    if (window.confirm("确定删除这道题？")) {
      database.ref('settings/arcadeQuestions').set(arcadeQuestions.filter((_, i) => i !== idx));
      if (editingQIdx === idx) setEditingQIdx(null);
    }
  };

  /* ── 题目编辑：开始编辑 ──────────────────────────────────────── */
  const handleStartEditQ = (idx) => {
    const q = arcadeQuestions[idx];
    setEditingQIdx(idx);
    setEditQ(q.q);
    // 补齐 4 个槽位（不足的补空字符串）
    const opts = [...q.opts];
    while (opts.length < 4) opts.push("");
    setEditOpts(opts);
    setEditAns(q.ans);
    AudioEngine.sfxClick();
  };

  /* ── 题目编辑：保存 ──────────────────────────────────────────── */
  const handleSaveEditQ = async (idx) => {
    if (!editQ.trim()) return alert("题目内容不能为空！");
    if (!editOpts[0].trim() || !editOpts[1].trim()) return alert("选项 A 和 B 不能为空！");
    // 收集非空选项
    const finalOpts = editOpts.filter(o => o.trim() !== "");
    if (editAns >= finalOpts.length) return alert("正确答案超出选项范围，请重新选择！");
    const updated = arcadeQuestions.map((q, i) =>
      i === idx ? { q: editQ.trim(), opts: finalOpts, ans: editAns } : q
    );
    await database.ref('settings/arcadeQuestions').set(updated);
    setEditingQIdx(null);
    AudioEngine.sfxCorrect();
  };

  /* ── 题目编辑：取消 ──────────────────────────────────────────── */
  const handleCancelEditQ = () => {
    setEditingQIdx(null);
    AudioEngine.sfxClick();
  };

  /* ── 功能二：文件上传 → AI 抽题（升级版：PDF 用 Vision，支持 4 选项）── */
  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadError("");
    setUploadState("parsing");
    setParsedQuestions([]);

    try {
      let apiMessages = [];

      if (file.name.endsWith(".docx")) {
        // Word 文件：用 mammoth.js 提取文字后发给 Claude 文字接口
        if (!window.mammoth) throw new Error("mammoth 库未加载，请检查网络连接");
        const arrayBuffer = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer });
        const rawText = result.value;
        if (!rawText.trim()) throw new Error("Word 文件内容为空或无法读取");
        const trimmedText = rawText.slice(0, 12000);
        apiMessages = [{
          role: "user",
          content: buildExtractionPrompt(trimmedText)
        }];

      } else if (file.name.endsWith(".pdf")) {
        // PDF 文件：转 base64 直接发给 Claude Vision（支持扫描版 + 文字版）
        const base64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload  = () => res(reader.result.split(",")[1]);
          reader.onerror = () => rej(new Error("文件读取失败"));
          reader.readAsDataURL(file);
        });
        apiMessages = [{
          role: "user",
          content: [
            {
              type: "document",
              source: { type: "base64", media_type: "application/pdf", data: base64 }
            },
            {
              type: "text",
              text: buildExtractionPrompt(null)  // null = 看图模式，不附文字
            }
          ]
        }];
      } else {
        throw new Error("不支持的文件格式！请上传 .docx 或 .pdf 文件");
      }

      // 调用 Claude API
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: apiMessages
        })
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(`AI 分析失败（HTTP ${response.status}）：${errBody.error?.message || ""}`);
      }

      const data = await response.json();
      const rawJson = data.content?.map(b => b.type === "text" ? b.text : "").join("") || "[]";
      const cleaned = rawJson.replace(/```json|```/g, "").trim();
      const questions = JSON.parse(cleaned);

      if (!Array.isArray(questions) || questions.length === 0) {
        throw new Error("AI 未能识别出任何题目，请检查文件是否包含选择题");
      }

      setParsedQuestions(questions);
      setUploadState("preview");
      AudioEngine.sfxCorrect();

    } catch (err) {
      setUploadError(err.message || "未知错误，请重试");
      setUploadState("idle");
      AudioEngine.sfxWrong();
    }

    e.target.value = "";
  };

  /* ── AI 提取题目的 Prompt（文字模式 / 视觉模式共用） ────────── */
  const buildExtractionPrompt = (textContent) => {
    const base = `你是马来文选择题提取专家。请从${textContent ? "以下文字" : "这份文件"}中识别出所有选择题（包括 A/B 两选项和 A/B/C/D 四选项的题目），并以 JSON 数组格式返回。

每道题的格式：
{"q":"题目内容（填空用 _____ 表示）","opts":["选项A","选项B","选项C","选项D"],"ans":0}

规则：
- opts 数组按题目实际选项数填写（2个选项就放2个，4个就放4个）
- ans 为正确答案的索引（0=A, 1=B, 2=C, 3=D）
- 如果文件有标注 Jawapan/答案，请按照它设定 ans；如果无法确定，ans 设为 -1
- 忽略说明文字、例题解析、图片说明，只提取练习题
- 只返回 JSON 数组，不要任何其他文字或 markdown 代码块`;

    return textContent ? `${base}\n\n文字内容：\n${textContent}` : base;
  };

  /* ── 确认上传已识别题目到题库 ───────────────────────────────── */
  const handleConfirmUpload = async () => {

    const valid = parsedQuestions.filter(q => q.ans >= 0 && q.ans <= 3 && q.ans !== -1);
    if (valid.length === 0) return alert("没有可上传的题目（所有题目均需人工确认答案）");

    try {
      await database.ref('settings/arcadeQuestions').set([...arcadeQuestions, ...valid]);
      setParsedQuestions([]);
      setUploadState("idle");
      AudioEngine.sfxVictory();

/* ══════════════════════ ⚡ 体力系统常量 ══════════════════════ */
const ENERGY_MAX       = 5;          // 体力上限
const ENERGY_REFILL_MS = 2 * 60 * 60 * 1000; // 2小时，以毫秒计

/* ──────────────────────────────────────────────────────────────
   EnergyEngine：所有体力相关的 Firebase 读写逻辑封装在此
   ────────────────────────────────────────────────────────────── */
const EnergyEngine = {

  /**
   * 从 Firebase 读取学生的当前体力与 lastRefillTime。
   * 然后根据「现在 - lastRefillTime」计算出应恢复几点体力，
   * 更新 Firebase，并返回最新的体力值与下次恢复的倒计时秒数。
   *
   * @param {string}   studentKey   Firebase students/ 下的节点 key
   * @param {object}   studentData  当前 student 数据快照（来自 db[key]）
   * @returns {Promise<{ energy: number, secsToNext: number }>}
   */
  async syncAndRefill(studentKey, studentData) {
    const now          = Date.now();
    const rawEnergy    = typeof studentData.energy === 'number'
                           ? studentData.energy
                           : ENERGY_MAX;   // 新账号默认满格
    const lastRefill   = typeof studentData.lastRefillTime === 'number'
                           ? studentData.lastRefillTime
                           : now;           // 新账号默认当前时间

    // 已经过了多少个「2小时」周期
    const elapsedMs    = Math.max(0, now - lastRefill);
    const periodsGone  = Math.floor(elapsedMs / ENERGY_REFILL_MS);

    // 如果体力已满，或没有任何周期过完，就不需要写入 Firebase
    if (rawEnergy >= ENERGY_MAX || periodsGone === 0) {
      const secsToNext = rawEnergy >= ENERGY_MAX
        ? 0   // 满格，不需要倒计时
        : Math.ceil((ENERGY_REFILL_MS - (elapsedMs % ENERGY_REFILL_MS)) / 1000);

      return { energy: Math.min(rawEnergy, ENERGY_MAX), secsToNext };
    }

    // 计算恢复后的体力（不超上限）
    const newEnergy = Math.min(rawEnergy + periodsGone, ENERGY_MAX);

    // 新的 lastRefillTime = 扣除已用整周期后的时间点
    // 这样剩余不足一个周期的时间会被保留，不会被浪费
    const usedMs       = periodsGone * ENERGY_REFILL_MS;
    const newRefillTs  = lastRefill + usedMs;

    // 写入 Firebase（局部更新，不覆盖整个学生节点）
    await database.ref(`students/${studentKey}`).update({
      energy:         newEnergy,
      lastRefillTime: newRefillTs,
    });

    const remainingMs  = ENERGY_REFILL_MS - (now - newRefillTs);
    const secsToNext   = newEnergy >= ENERGY_MAX
      ? 0
      : Math.ceil(Math.max(0, remainingMs) / 1000);

    return { energy: newEnergy, secsToNext };
  },

  /**
   * 消耗 1 点体力（游戏开始时调用）。
   * 同时把 lastRefillTime 设为 Firebase 服务器时间戳，防止本地时间作弊。
   *
   * @param {string} studentKey
   * @param {number} currentEnergy
   * @returns {Promise<void>}
   */
  async consume(studentKey, currentEnergy) {
    const newEnergy = Math.max(0, currentEnergy - 1);
    await database.ref(`students/${studentKey}`).update({
      energy:         newEnergy,
      // 服务器时间戳：由 Firebase 服务端写入真实时间，防止客户端伪造
      lastRefillTime: firebase.database.ServerValue.TIMESTAMP,
    });
  },

  /**
   * 初始化新账号的体力字段（首次登录时调用）。
   */
  async initIfMissing(studentKey, studentData) {
    if (typeof studentData.energy !== 'number') {
      await database.ref(`students/${studentKey}`).update({
        energy:         ENERGY_MAX,
        lastRefillTime: firebase.database.ServerValue.TIMESTAMP,
      });
    }
  },
};

/* ══════════════════════════════════════════════════════════════
   ⚡ EnergyBar —— 体力显示 + 倒计时 子组件
   Props:
     energy      {number}  当前体力值
     secsToNext  {number}  距下次回复的剩余秒数（0 = 已满 / 不显示倒计时）
   ══════════════════════════════════════════════════════════════ */
const EnergyBar = ({ energy, secsToNext }) => {
  // 本地倒计时：每秒 -1，到 0 就停
  const [countdown, setCountdown] = useState(secsToNext);

  // 当父组件传入新的 secsToNext（如刚进大厅、游戏结束回来）时同步
  useEffect(() => {
    setCountdown(secsToNext);
  }, [secsToNext]);

  // 每秒倒数
  useEffect(() => {
    if (countdown <= 0) return;
    const t = setTimeout(() => setCountdown(c => Math.max(0, c - 1)), 1000);
    return () => clearTimeout(t);
  }, [countdown]);

  // 把秒数格式化为 HH:MM:SS
  const formatTime = (secs) => {
    const h  = Math.floor(secs / 3600);
    const m  = Math.floor((secs % 3600) / 60);
    const s  = secs % 60;
    return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
  };

  const isFull = energy >= ENERGY_MAX;

  return (
    <div className="flex flex-col items-end gap-1">
      {/* 体力格子 */}
      <div className="flex items-center gap-2">
        <span className="text-xs font-black text-cyan-400 tracking-wider">⚡ 体力</span>
        <div className="flex gap-1">
          {Array.from({ length: ENERGY_MAX }).map((_, i) => (
            <div
              key={i}
              className={`w-5 h-5 rounded-md border-2 transition-all duration-300 ${
                i < energy
                  ? 'bg-cyan-400 border-cyan-300 shadow-[0_0_6px_rgba(34,211,238,0.6)]'
                  : 'bg-slate-800 border-slate-700'
              }`}
            />
          ))}
        </div>
        <span className="font-black text-sm font-mono text-cyan-300">
          {energy}/{ENERGY_MAX}
        </span>
      </div>

      {/* 倒计时（仅在体力不满且有剩余秒数时显示） */}
      {!isFull && countdown > 0 && (
        <div className="text-[10px] font-mono text-slate-400 flex items-center gap-1">
          <span className="text-cyan-500/70">⏳</span>
          <span className={countdown <= 300 ? 'text-amber-400 animate-pulse' : ''}>
            {formatTime(countdown)}
          </span>
          <span>后回复 1 点</span>
        </div>
      )}

      {/* 体力耗尽提示 */}
      {energy === 0 && (
        <div className="text-[10px] font-bold text-red-400 animate-pulse">
          体力耗尽！请等待自动回复
        </div>
      )}
    </div>
  );
};

/* ── StudentDashboard 主组件 ─────────────────────────────────────── */
const StudentDashboard = ({
  student,
  allStudents,
  currentMenu,
  onGameComplete,
  streakData,
  currentUsername,   // Firebase students/ 节点 key
}) => {
  const [showFullReport,  setShowFullReport]  = useState(false);
  const [arcadeView,      setArcadeView]      = useState("lobby");
  const [liveMode,        setLiveMode]        = useState(false);
  const [taskRefreshKey,  setTaskRefreshKey]  = useState(0);
  const [streakNotif,     setStreakNotif]      = useState(streakData || null);
  const [cosmeticRefresh, setCosmeticRefresh] = useState(0);
  const [energy,          setEnergy]          = useState(ENERGY_MAX);
  const [secsToNext,      setSecsToNext]      = useState(0);
  const energySynced = useRef(false);

  const safeStudent = student || DEFAULT_STUDENTS["student_1"];
  const studentKey  = currentUsername || "student_1";

  const myClass      = safeStudent?.classTime || "";
  const classmates   = Object.values(allStudents || {}).filter(s => s.classTime === myClass && s.name);
  classmates.sort((a, b) => (b.pts || 0) - (a.pts || 0));
  const myRankIndex  = classmates.findIndex(s => s.id === safeStudent.id);
  const myRank       = myRankIndex !== -1 ? myRankIndex + 1 : "-";
  const top3         = classmates.slice(0, 3);
  const isMeInTop3   = myRankIndex !== -1 && myRankIndex < 3;

  const runEnergySync = async () => {
    try {
      await EnergyEngine.initIfMissing(studentKey, safeStudent);
      const snap = await database.ref(`students/${studentKey}`).once('value');
      const freshData = snap.val() || safeStudent;
      const result = await EnergyEngine.syncAndRefill(studentKey, freshData);
      setEnergy(result.energy);
      setSecsToNext(result.secsToNext);
    } catch (err) {
      const fallbackEnergy = typeof safeStudent.energy === 'number' ? safeStudent.energy : ENERGY_MAX;
      setEnergy(fallbackEnergy);
      setSecsToNext(0);
    }
  };

  useEffect(() => {
    if (currentMenu === "arcade" && arcadeView === "lobby") runEnergySync();
  }, [currentMenu, arcadeView]);

  useEffect(() => {
    if (!energySynced.current) {
      energySynced.current = true;
      runEnergySync();
    }
  }, []);

  const handleTaskEvent = (type, value) => {
    DailyTasksEngine.update(type, value);
    setTaskRefreshKey(p => p + 1);
  };

  const handleTaskClaim = (reward) => {
    onGameComplete(reward);
    setTaskRefreshKey(p => p + 1);
  };

  const handleCosmeticDrop = () => {
    setCosmeticRefresh(p => p + 1);
  };

  const handleLaunchGame = async (gameId) => {
    AudioEngine.sfxClick();
    if (energy <= 0) { AudioEngine.sfxWrong(); return; }
    const optimisticEnergy = energy - 1;
    setEnergy(optimisticEnergy);
    setSecsToNext(optimisticEnergy < ENERGY_MAX ? ENERGY_REFILL_MS / 1000 : 0);
    try {
      await EnergyEngine.consume(studentKey, energy);
    } catch (err) {
      setEnergy(energy);
    }
    setArcadeView(gameId);
  };

  const handleGameCompleteWrapper = (score) => {
    onGameComplete(score);
    setTaskRefreshKey(p => p + 1);
    setArcadeView("lobby");
  };

  /* ── 游戏界面（非大厅） ─────────────────────────────────────────── */
  if (currentMenu === "arcade") {
    if (liveMode) {
      return (
        <div className="flex-1 flex flex-col bg-[#030712]">
          <button onClick={() => { AudioEngine.sfxClick(); setLiveMode(false); }} className="m-4 self-start bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold">⬅️ 返回游戏大厅</button>
          <LivePlayer studentData={safeStudent} studentKey={studentKey} />
        </div>

      if (arcadeView === "vocab") {
        return (
          <div className="w-full h-full bg-[#060415] flex flex-col p-4 animate-fade-in relative min-h-0 overflow-hidden">
            <VocabMatchGame
              onExit={() => { AudioEngine.sfxClick(); setArcadeView("lobby"); }}
              onGameComplete={handleGameCompleteWrapper}
              onTaskEvent={handleTaskEvent}
            />
          </div>
        );
      }
      return (
        <div className="w-full h-full bg-[#060415] flex flex-col p-4 animate-fade-in relative min-h-0 overflow-hidden">
          <GameEngine
            mode={arcadeView}
            onExit={() => { AudioEngine.sfxClick(); setArcadeView("lobby"); }}
